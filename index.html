<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe Thongchai — Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Poppins:wght@300;400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ec;--bg2:#ede8df;--ink:#181512;--ink2:#3a3530;--muted:#928d86;--line:#ddd8cf;
  --c1:#4a3580;--c2:#1a5c38;--c3:#b03818;
  --serif:'EB Garamond',Georgia,serif;--sans:'Poppins',sans-serif;
  --thai:'IBM Plex Sans Thai',sans-serif;--mono:'IBM Plex Mono','IBM Plex Sans Thai',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Thai',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:80px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(247,243,236,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink2);text-decoration:none}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--c3)}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-btn{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:2px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s}
.nav-btn:hover{border-color:var(--ink);color:var(--ink)}
.nav-btn.act{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.nav-btn.sv{background:var(--c3);color:#fff;border-color:var(--c3)}
.nav-btn.sv:hover{background:#962f12}
.nav-lang{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden}
.nav-lang button{font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:6px 12px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s}
.nav-lang button.on{background:var(--ink);color:var(--bg)}

/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(24,21,18,0.96);backdrop-filter:blur(12px);padding:14px 52px;display:flex;align-items:center;justify-content:space-between;transform:translateY(100%);transition:transform .3s ease}
.save-bar.on{transform:none}
.sb-l{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
.sb-msg{color:rgba(255,255,255,.4)}
.sb-ok{color:#6dbf6d;opacity:0;transition:opacity .3s}
.sb-ok.on{opacity:1}
.sb-btns{display:flex;gap:8px}
.sbb{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 20px;border-radius:2px;border:none;cursor:pointer;transition:all .18s}
.sbb.fill{background:var(--c3);color:#fff}.sbb.fill:hover{background:#962f12}
.sbb.ghost{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.18)}.sbb.ghost:hover{color:#fff}

/* HERO */
.hero{max-width:1080px;margin:0 auto;padding:80px 52px 64px;position:relative;overflow:hidden}
.hero-ghost{position:absolute;top:60px;right:-20px;font-family:var(--serif);font-size:clamp(120px,18vw,220px);font-weight:400;font-style:italic;color:transparent;-webkit-text-stroke:1.5px var(--line);line-height:1;pointer-events:none;user-select:none;opacity:0;animation:fadeIn 1.2s .5s ease forwards}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--c3);display:flex;align-items:center;gap:10px;margin-bottom:28px;opacity:0;animation:up .7s .1s ease forwards}
.hero-tag::before{content:'';display:block;width:24px;height:1px;background:var(--c3)}
.hero-h1{font-family:var(--serif);font-size:clamp(64px,10vw,124px);font-weight:400;line-height:.92;letter-spacing:-.025em;margin-bottom:48px;opacity:0;animation:up .8s .2s ease forwards}
.hero-h1 em{font-style:italic;color:var(--c3)}
.hero-rule{width:100%;height:1px;background:var(--line);margin:0 0 0;opacity:0;animation:fadeIn .6s .5s ease forwards}
.hero-meta{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);border-bottom:1px solid var(--line);opacity:0;animation:up .7s .55s ease forwards}
.hero-cell{padding:22px 0;border-right:1px solid var(--line)}
.hero-cell:not(:first-child){padding-left:28px}
.hero-cell:last-child{border-right:none}
.cell-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cell-val{font-family:var(--serif);font-size:18px;color:var(--ink);line-height:1.35}
.hero-hint{display:flex;align-items:center;gap:14px;margin-top:48px;opacity:0;animation:up .6s .8s ease forwards}
.hint-ln{width:44px;height:1px;background:var(--muted)}
.hint-txt{font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}

/* CHAPTER */
.chapter{border-top:2px solid var(--line);position:relative}
.chapter[data-c="1"]{--cc:var(--c1)}
.chapter[data-c="2"]{--cc:var(--c2)}
.chapter[data-c="3"]{--cc:var(--c3)}
.chapter::before{content:'';position:absolute;top:-2px;left:52px;width:100px;height:2px;background:var(--cc)}

.ch-head{max-width:1080px;margin:0 auto;padding:52px 52px 0;display:grid;grid-template-columns:1fr 300px;gap:40px}
.ch-left{padding-bottom:40px}
.ch-over{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.ch-title{font-family:var(--serif);font-size:clamp(44px,6vw,80px);font-weight:400;line-height:.95;color:var(--cc);margin-bottom:18px}
.ch-title em{font-style:italic}
.ch-tag{font-family:var(--thai);font-size:14px;font-weight:300;color:var(--ink2);line-height:1.85;margin-bottom:20px}
.ch-pill{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:4px 14px;border-radius:100px;border:1px solid var(--cc);color:var(--cc);margin-right:6px}

/* CHAPTER IMAGE */
.ch-img-wrap{position:relative;border:1px solid var(--line);border-radius:3px;overflow:hidden;background:var(--bg2);min-height:200px;display:flex;align-items:center;justify-content:center}
.ch-img-wrap img{width:100%;display:block}
.ch-img-ph{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;width:100%;height:100%;min-height:220px;justify-content:center}
.ch-img-ph .big-plus{font-size:28px;color:var(--line)}
.ch-img-ph .ph-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.ch-img-actions{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;opacity:0;transition:opacity .2s}
.ch-img-wrap:hover .ch-img-actions{opacity:1}
.ch-img-btn{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:2px;border:none;cursor:pointer;background:rgba(247,243,236,.92);color:var(--ink)}

/* ENTRIES */
.entries{max-width:1080px;margin:0 auto;padding:32px 52px 64px}
.entry{border-top:1px solid var(--line);opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s}
.entry.vis{opacity:1;transform:none}
.entry:last-child{border-bottom:1px solid var(--line)}

.e-hdr{display:grid;grid-template-columns:110px 1fr 36px;gap:0 32px;align-items:center;padding:24px 0;cursor:pointer;user-select:none}
.e-year{font-family:var(--mono);font-size:10px;letter-spacing:.06em;white-space:pre-line;line-height:1.7;color:var(--cc)}
[contenteditable]{outline:none;border-radius:2px;transition:background .15s}
[contenteditable]:hover{background:rgba(0,0,0,.035)}
[contenteditable]:focus{background:rgba(0,0,0,.05)}
.e-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);display:block;line-height:1.2;margin-bottom:3px;transition:color .18s;padding:2px 4px;margin-left:-4px}
.e-hdr:hover .e-title{color:var(--cc)}
.e-role{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;padding:2px 4px;margin-left:-4px}
.e-arrow{width:32px;height:32px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .3s;pointer-events:none;flex-shrink:0}
.entry.open .e-arrow{transform:rotate(180deg);background:var(--cc);border-color:var(--cc);color:#fff}

.e-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .42s cubic-bezier(.4,0,.2,1)}
.entry.open .e-body{grid-template-rows:1fr}
.e-body-in{overflow:hidden;padding-left:142px}
.e-content{padding:8px 0 44px;display:flex;flex-direction:column;gap:28px}

/* IMAGE LAYOUT: land-grid left + portrait right */
.img-block{display:grid;grid-template-columns:2fr 1fr;gap:1px;align-items:stretch;background:var(--line);margin-bottom:1px}
.img-layout{display:grid;grid-template-columns:2fr 1fr;gap:1px;margin-bottom:0;align-items:stretch;background:var(--line)}
.land-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.land-item{display:flex;flex-direction:column;gap:0;background:var(--bg)}
.land-slot{aspect-ratio:3/2;background:var(--bg2);border:none;border-radius:0;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .18s}
.land-slot.up{cursor:pointer}.land-slot.up:hover{background:#e5dfd6}
.land-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.land-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.s-plus{font-size:20px;color:var(--muted);line-height:1;opacity:0.5}
.s-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.land-slot.filled .s-plus,.land-slot.filled .s-lbl{display:none}
.slot-ov{position:absolute;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;gap:6px;opacity:0;transition:opacity .18s}
.land-slot:hover .slot-ov{opacity:1}
.ov-btn{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:2px;border:none;cursor:pointer;background:rgba(247,243,236,.92);color:var(--ink)}
.i-cap{width:100%;font-family:var(--mono);font-size:9px;color:var(--ink2);background:var(--bg);border:none;border-bottom:1px solid var(--line);padding:5px 8px;outline:none;transition:border-color .18s}
.i-cap::placeholder{color:var(--muted)}
.i-cap:focus{border-color:var(--cc)}
.add-land{font-family:'IBM Plex Mono','IBM Plex Sans Thai',sans-serif;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px dashed var(--line);padding:8px 12px;cursor:pointer;border-radius:2px;transition:all .18s;margin-top:8px;width:100%}
.add-land:hover{color:var(--cc);border-color:var(--cc)}

/* PORTRAIT CAROUSEL */
.port-col{display:flex;flex-direction:column;gap:1px;align-self:stretch;background:var(--line);height:100%}
.port-slot{position:relative;overflow:hidden;border:none;border-radius:0;background:var(--bg2);width:100%;flex:1;min-height:0}
.port-slot img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}
.port-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;width:100%;height:100%;min-height:100px}
.port-counter{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;background:rgba(0,0,0,.5);color:#fff;padding:3px 8px;border-radius:100px;pointer-events:none}
.port-nav{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(247,243,236,.88);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:14px;z-index:3}
.port-nav:hover{background:rgba(247,243,236,1)}
.port-prev{left:7px}.port-next{right:7px}
.port-edit-ov{position:absolute;bottom:8px;right:8px;display:flex;gap:5px;opacity:0;transition:opacity .18s;z-index:3}
.port-slot:hover .port-edit-ov{opacity:1}
.port-add{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px dashed var(--line);padding:6px;cursor:pointer;border-radius:2px;transition:all .18s}
.video-section{margin-top:1px;background:var(--line)}
.video-item{background:var(--bg);display:flex;flex-direction:column;gap:0;margin-bottom:1px}
.video-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:var(--ink)}
.video-embed iframe,.video-embed video{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-url-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-top:1px solid var(--line)}
.video-url-input{flex:1;font-family:var(--mono);font-size:10px;color:var(--ink2);background:transparent;border:none;outline:none;padding:0}
.video-url-input::placeholder{color:var(--muted)}
.add-video-btn{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px dashed var(--line);padding:7px 14px;cursor:pointer;border-radius:2px;transition:all .18s;margin-top:1px;display:block;width:100%}
.add-video-btn:hover{color:var(--cc);border-color:var(--cc)}
.vid-rm-btn{font-family:var(--mono);font-size:9px;padding:3px 8px;background:transparent;border:1px solid var(--line);border-radius:2px;cursor:pointer;color:var(--muted);transition:all .18s}
.vid-rm-btn:hover{background:var(--c3);color:#fff;border-color:var(--c3)}
.port-add:hover{color:var(--cc);border-color:var(--cc)}

/* TEXT COLUMN */
.e-text{}
.e-hint{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.e-hint::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--cc)}
.e-desc{font-family:var(--thai);font-size:13.5px;line-height:1.95;color:var(--ink2);display:block;padding:2px 5px;margin-left:-5px;margin-bottom:14px;min-height:40px}
.e-quote{font-family:var(--serif);font-size:15px;font-style:italic;border-left:2px solid var(--cc);padding:3px 3px 3px 13px;margin-bottom:18px;line-height:1.65;display:block;color:var(--cc);opacity:.85}
.kw-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kws{display:flex;flex-wrap:wrap;gap:5px}
.kw{font-family:var(--sans);font-size:9.5px;padding:4px 11px;border-radius:2px;border:1px solid var(--line);color:var(--ink2);background:var(--bg);font-weight:300;transition:all .15s;cursor:default}
.kw:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.kw.c{color:#fff;border:none}
.chapter[data-c="1"] .kw.c{background:var(--c1)}
.chapter[data-c="2"] .kw.c{background:var(--c2)}
.chapter[data-c="3"] .kw.c{background:var(--c3)}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center}
.lb.on{display:flex}
.lb-inner{max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}
.lb-inner img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:2px}
.lb-cap{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:rgba(255,255,255,.6)}
.lb-count{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.4)}
.lb-close{position:fixed;top:18px;right:22px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-nav-btn{position:fixed;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-prev{left:18px}.lb-next{right:18px}

/* CONTACT */
.contact{max-width:1080px;margin:60px auto 0;padding:64px 52px 72px;border-top:2px solid var(--line);position:relative}
.contact::before{content:'';position:absolute;top:-2px;left:52px;width:80px;height:2px;background:var(--c3)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.contact-stamp{width:88px;height:88px;border:1.5px solid var(--c3);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-8deg);margin-bottom:28px}
.stamp-txt{font-family:var(--mono);font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--c3);line-height:2;text-align:center}
.contact-h{font-family:var(--serif);font-size:clamp(34px,5vw,56px);font-weight:400;line-height:1.05;margin-bottom:12px}
.contact-h em{font-style:italic;color:var(--c3)}
.contact-sub{font-family:var(--thai);font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:32px;font-weight:300}
.btn-fill{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;background:var(--ink);color:var(--bg);font-family:var(--sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border-radius:2px;font-weight:500;transition:background .18s;margin-bottom:10px;border:none;cursor:pointer}
.btn-fill:hover{background:var(--c3)}
.btn-out{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;background:transparent;color:var(--ink2);font-family:var(--sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border:1px solid var(--line);border-radius:2px;transition:all .18s}
.btn-out:hover{border-color:var(--ink);color:var(--ink)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:2px;overflow:hidden}
.info-cell{background:var(--bg);padding:22px 20px}
.info-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.info-val{font-family:var(--serif);font-size:17px;color:var(--ink);line-height:1.3}

footer{max-width:1080px;margin:0 auto;padding:24px 52px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.foot-l{font-family:var(--thai);font-size:11px;color:var(--muted)}
.foot-links{display:flex;gap:20px;list-style:none}
.foot-links a{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .18s}
.foot-links a:hover{color:var(--ink)}

@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(max-width:860px){
  nav,.hero,.entries,.contact,.ch-head{padding-left:20px;padding-right:20px}
  .hero-meta{grid-template-columns:1fr}
  .hero-cell{border-right:none;border-top:1px solid var(--line);padding:16px 0}
  .hero-cell:first-child{border-top:none}
  .ch-head{grid-template-columns:1fr}
  .e-hdr{grid-template-columns:80px 1fr 32px;gap:0 14px}
  .e-body-in{padding-left:0}
  .img-section{margin-left:0;margin-right:0}
  .img-layout{grid-template-columns:1fr 1fr}
  .port-col{grid-column:auto}
  .contact-grid{grid-template-columns:1fr;gap:36px}
  .info-grid{grid-template-columns:1fr}
  footer{flex-direction:column;gap:12px;padding:20px}
  .chapter::before,.contact::before{left:20px}
  .save-bar{padding:14px 20px}
}
</style>
</head>
<body>

<!-- SAVE BAR -->
<div class="save-bar" id="saveBar">
  <div class="sb-l">
    <span class="sb-msg">Unsaved changes</span>
    <span class="sb-ok" id="sbOk">✓ Saved</span>
  </div>
  <div class="sb-btns">
    <button class="sbb ghost" onclick="discardAll()">Discard</button>
    <button class="sbb fill" onclick="saveAll()">Save</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav-btn lb-prev" onclick="lbNav(-1)">‹</button>

function save(key, val) {
  try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); return true; }
  catch(e) { console.warn('Storage full:', key, e.name); return false; }
}
function load(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}

function loadData() {
  try {
    const raw = load(SK);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.order && parsed.entries) data = parsed;
    }
  } catch(e) { console.warn('loadData error:', e); }
  for (const id of data.order) {
    const e = data.entries[id];
    imgCache[id] = { land: [], port: [] };
    portIdx[id] = 0;
    for (let i = 0; i < (e.landCount||4); i++) {
      const src = load(`${IK}:${id}:l${i}`);
      imgCache[id].land.push({ src: src||null, cap: e.landCaps?.[i]||'' });
    }
    for (let i = 0; i < (e.portCount||1); i++) {
      const src = load(`${IK}:${id}:p${i}`);
      imgCache[id].port.push({ src: src||null, cap: e.portCaps?.[i]||'' });
    }
  }
  for (let c = 1; c <= 3; c++) {
    imgCache[`ch${c}`] = load(`${IK}:ch${c}`) || null;
  }
  // ensure chData and heroData exist (migrate from old saves)
  if (!data.chData) data.chData = JSON.parse(JSON.stringify(DEF.chData));
  // ensure videos array exists on all entries
  for (const id of data.order) {
    if (!data.entries[id].videos) data.entries[id].videos = [];
  }
  if (!data.heroData) data.heroData = JSON.parse(JSON.stringify(DEF.heroData));
  render();
}

function saveAll() {
  const sv = JSON.parse(JSON.stringify(data));
  for (const id of data.order) {
    sv.entries[id].landCount = imgCache[id].land.length;
    sv.entries[id].portCount = imgCache[id].port.length;
    sv.entries[id].landCaps = imgCache[id].land.map(i=>i.cap||'');
    sv.entries[id].portCaps = imgCache[id].port.map(i=>i.cap||'');
  }
  save(SK, sv);

  let failed = 0;
  for (const id of data.order) {
    imgCache[id].land.forEach((img,i) => {
      if (img.src) { if (!save(`${IK}:${id}:l${i}`, img.src)) failed++; }
      else { try{localStorage.removeItem(`${IK}:${id}:l${i}`);}catch(e){} }
    });
    imgCache[id].port.forEach((img,i) => {
      if (img.src) { if (!save(`${IK}:${id}:p${i}`, img.src)) failed++; }
      else { try{localStorage.removeItem(`${IK}:${id}:p${i}`);}catch(e){} }
    });
  }
  for (let c = 1; c <= 3; c++) {
    if (imgCache[`ch${c}`]) { if (!save(`${IK}:ch${c}`, imgCache[`ch${c}`])) failed++; }
    else { try{localStorage.removeItem(`${IK}:ch${c}`);}catch(e){} }
  }

  if (failed > 0) alert(`${failed} รูปบันทึกไม่ได้เพราะพื้นที่เต็ม ลองใช้รูปขนาดเล็กลงครับ`);
  dirty = false;
  document.getElementById('saveBar').classList.remove('on');
  const ok = document.getElementById('sbOk'); ok.classList.add('on');
  setTimeout(() => ok.classList.remove('on'), 2000);
}

function discardAll() {

}

function markDirty() {

// ── COMPRESS ──────────────────────────────────────────────────
function compress(src, mW, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const r = Math.min((mW||1000)/img.width, (mW||1000)/img.height, 1);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*r); c.height = Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg', q||0.75));
    };
    img.src = src;
  });
}

    const portCol = layout.querySelector('.port-col');
    if (!portCol) return;
    const landItems = layout.querySelectorAll('.land-item');
    if (!landItems.length) return;
    const rows = Math.ceil(landItems.length / 2);
    const slotH = landItems[0].querySelector('.land-slot')?.offsetHeight || 120;
    const totalH = rows * slotH + (rows-1) * 10;
    const portSlot = portCol.querySelector('.port-slot');
    if (portSlot) portSlot.style.height = Math.max(totalH, 80) + 'px';
  });
}

function mkChImg(chId) {
  const src = imgCache[`ch${chId}`];
  if (src) return `<div class="ch-img-wrap"><img src="${src}" alt=""><div class="ch-img-actions">${editMode?`<label style="cursor:pointer"><span class="ch-img-btn">${T[lang].change}</span><input type="file" accept="image/*" style="display:none" onchange="upChImg(this,${chId})"></label><button class="ch-img-btn" onclick="rmChImg(${chId})">${T[lang].remove}</button>`:''}</div></div>`;
  if (!editMode) return `<div style="min-height:200px;background:var(--bg2);border:1px solid var(--line);border-radius:3px"></div>`;
  return `<div class="ch-img-wrap"><div class="ch-img-ph"><label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;height:100%;min-height:200px;justify-content:center"><span class="big-plus">+</span><span class="ph-lbl">${T[lang].addCh}</span><input type="file" accept="image/*" style="display:none" onchange="upChImg(this,${chId})"></label></div></div>`;
}

function mkEntry(e) {
  const t = T[lang];
  const land = (imgCache[e.id] || {land:[],port:[]}).land;
  const port = (imgCache[e.id] || {land:[],port:[]}).port;
  const pidx = portIdx[e.id] || 0;
  const curPort = port[pidx] || {src:null,cap:''};
  const rows = Math.max(1, Math.ceil(land.length/2));

  // Blocks: each block = 4 landscape (2x2) + 1 portrait
  const numBlocks = Math.max(1, Math.ceil(land.length / 4));
  let blocksH = '';
  for (let b = 0; b < numBlocks; b++) {
    const bLand = land.slice(b*4, b*4+4);
    const bPort = port[b] || {src:null,cap:''};
    const slots = editMode ? [...bLand,...Array(Math.max(0,4-bLand.length)).fill({src:null,cap:''})] : [...bLand,...Array(Math.max(0,4-bLand.length)).fill({src:null,cap:''})];
    let landBH = '';
    slots.forEach((img,li) => {
      const i = b*4+li;
      landBH += `<div class="land-item">`;
      if (img&&img.src) {
        landBH += `<div class="land-slot filled" style="cursor:pointer" onclick="openLb('${e.id}','land',${i})"><img src="${img.src}" alt="">${editMode?`<div class="slot-ov"><label style="cursor:pointer"><span class="ov-btn">${t.change}</span><input type="file" accept="image/*" style="display:none" onchange="upLand(this,'${e.id}',${i})"></label><button class="ov-btn" onclick="rmLand('${e.id}',${i});event.stopPropagation()">${t.remove}</button></div>`:''}</div>`;
      } else if (editMode) {
        landBH += `<div class="land-slot up"><input type="file" accept="image/*" onchange="upLand(this,'${e.id}',${i})"><span class="s-plus">+</span><span class="s-lbl">${t.addP}</span></div>`;
      } else {
        landBH += `<div class="land-slot"></div>`;
      }
      landBH += `<input type="text" class="i-cap" placeholder="Caption..." value="${img?img.cap||'':''}" ${editMode&&img&&imgCache[e.id]&&imgCache[e.id].land[i]?`onchange="updLCap('${e.id}',${i},this.value)"`:'readonly'}>`;
      landBH += `</div>`;
    });
    let portContent='';
    if(bPort.src){
      portContent=`<img src="${bPort.src}" alt="" onclick="openLb('${e.id}','port',${b})" style="cursor:pointer">${editMode?`<div class="port-edit-ov"><label style="cursor:pointer"><span class="ov-btn">${t.change}</span><input type="file" accept="image/*" style="display:none" onchange="upPort(this,'${e.id}',${b})"></label><button class="ov-btn" onclick="rmPort('${e.id}',${b});event.stopPropagation()">${t.remove}</button></div>`:''}`;
    }else if(editMode){
      portContent=`<div class="port-ph"><label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;height:100%;justify-content:center"><span class="s-plus" style="font-size:20px">+</span><span class="s-lbl">${t.addPort}</span><input type="file" accept="image/*" style="display:none" onchange="upPort(this,'${e.id}',${b})"></label></div>`;
    }
    blocksH += `<div class="img-block"><div class="land-grid">${landBH}</div><div class="port-col"><div class="port-slot" style="flex:1;border:none">${portContent}</div><input type="text" class="i-cap" placeholder="Caption..." value="${bPort.cap||''}" ${editMode?`onchange="updPCap('${e.id}',${b},this.value)"`:'readonly'} style="margin-top:5px"></div></div>`;
  }

  const desc = lang==='th'?e.desc_th:e.desc_en;
  const quote = lang==='th'?e.quote_th:e.quote_en;
  const role = lang==='th'?e.role_th:e.role_en;

  return `<div class="entry" data-id="${e.id}">
    <div class="e-hdr" onclick="togEntry(this)">
      <div class="e-year">${e.year}</div>
      <div>
        <span class="e-title" ${editMode?`contenteditable="true" oninput="updF('${e.id}','title',this.innerText)"`:''} >${e.title}</span>
        <span class="e-role" ${editMode?`contenteditable="true" oninput="updF('${e.id}','role_${lang}',this.innerText)"`:''} >${role}</span>
      </div>
      <div class="e-arrow"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 3.5l3.5 4 3.5-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="e-body"><div class="e-body-in"><div class="e-content">
      <div class="e-text">
        ${editMode?`<div class="e-hint">${t.clickEdit}</div>`:''}
        <span class="e-desc" ${editMode?`contenteditable="true" oninput="updF('${e.id}','desc_${lang}',this.innerText)"`:''} >${desc}</span>
        ${(quote||editMode)?`<span class="e-quote" ${editMode?`contenteditable="true" oninput="updF('${e.id}','quote_${lang}',this.innerText)"`:''} ${!quote?'style="opacity:.28"':''} >${quote||''}</span>`:''}
        <div class="kw-lbl">${e.kwLabel}</div>
        <div class="kws">${e.kws.map(k=>`<span class="kw${k.c?' c':''}">${k.t}</span>`).join('')}</div>
      </div>
      <div class="img-section">
        ${blocksH}
        ${editMode?`<button class="add-land" onclick="addBlock('${e.id}')">+ เพิ่มชุดรูป (2×2 + portrait)</button>`:''}
      </div>
      ${mkVideos(e)}
    </div></div></div>
  </div>`;
}

// ── VIDEO HELPERS ────────────────────────────────────────────
function getVideoEmbed(url) {
  if (!url) return '';
  // YouTube
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
  if (m) return `<iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen></iframe>`;
  // Vimeo
  m = url.match(/vimeo\.com\/(\d+)/);
  if (m) return `<iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen></iframe>`;
  // Direct video file
  if (/\.(mp4|webm|mov)/i.test(url)) return `<video src="${url}" controls playsinline></video>`;
  return '';
}

function mkVideos(e) {
  const videos = e.videos || [];
  const hasVideos = videos.length > 0;
  if (!hasVideos && !editMode) return '';
  
  let h = '<div class="video-section">';
  videos.forEach((v, i) => {
    const embed = getVideoEmbed(v.url);
    h += `<div class="video-item">
      ${embed ? `<div class="video-embed">${embed}</div>` : (editMode ? `<div style="height:48px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--muted)">วาง URL วิดีโอด้านล่าง</div>` : '')}
      ${editMode ? `<div class="video-url-row">
        <input class="video-url-input" placeholder="YouTube / Vimeo / .mp4 URL..." value="${v.url||''}" oninput="updVideoUrl('${e.id}',${i},this.value)">
        <button class="vid-rm-btn" onclick="removeVideo('${e.id}',${i})">ลบ</button>
      </div>` : (v.url&&embed ? `<div class="video-url-row"><span style="font-family:var(--mono);font-size:9px;color:var(--muted)">${v.url}</span></div>` : '')}
      <input type="text" class="i-cap" placeholder="Caption..." value="${v.cap||''}" ${editMode?`onchange="updVideoCap('${e.id}',${i},this.value)"`:'readonly'}>
    </div>`;
  });
  if (editMode) {
    h += `<button class="add-video-btn" onclick="addVideo('${e.id}')">+ เพิ่มวิดีโอ (YouTube / Vimeo / MP4)</button>`;
  }
  h += '</div>';
  return h;
}

function addVideo(id) {
  if (!data.entries[id].videos) data.entries[id].videos = [];
  data.entries[id].videos.push({url:'',cap:''});
  markDirty(); render();
}
function removeVideo(id,i) {
  data.entries[id].videos.splice(i,1);
  markDirty(); render();
}
function updVideoUrl(id,i,val) {
  if (!data.entries[id].videos) return;
  data.entries[id].videos[i].url = val;
  markDirty();
  // Live refresh embed after short delay
  clearTimeout(window._vt);
  window._vt = setTimeout(render, 800);
}
function updVideoCap(id,i,val) {
  if (!data.entries[id].videos) return;
  data.entries[id].videos[i].cap = val;
  markDirty();
}

// ── INTERACTIONS ──────────────────────────────────────────────
function togEntry(h) {
  if (document.activeElement?.contentEditable==='true') return;
  h.closest('.entry').classList.toggle('open');
}
function updF(id,field,val){data.entries[id][field]=val;markDirty();}
function updLCap(id,i,v){imgCache[id].land[i].cap=v;markDirty();}
function updPCap(id,i,v){if(imgCache[id].port[i])imgCache[id].port[i].cap=v;markDirty();}

async function upLand(inp,id,i) {
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{imgCache[id].land[i].src=await compress(ev.target.result,1000,.75);markDirty();render();};
  r.readAsDataURL(f);
}
function rmLand(id,i){imgCache[id].land[i].src=null;markDirty();render();}
function addLand(id){ addBlock(id); }
function addBlock(id){
  // Add 4 landscape + 1 portrait = 1 complete block
  for(let i=0;i<4;i++) imgCache[id].land.push({src:null,cap:''});
  imgCache[id].port.push({src:null,cap:''});
  data.entries[id].landCount=imgCache[id].land.length;
  data.entries[id].portCount=imgCache[id].port.length;
  markDirty(); render();
}
function updHero(field,val){ data.heroData[field]=val; markDirty(); }
function updChData(chId,field,val){ data.chData[chId][field]=val; markDirty(); }

async function upPort(inp,id,i) {
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    while(imgCache[id].port.length<=i)imgCache[id].port.push({src:null,cap:''});
    imgCache[id].port[i].src=await compress(ev.target.result,800,.78);
    markDirty();render();
  };r.readAsDataURL(f);
}
function rmPort(id,i){
  imgCache[id].port[i].src=null;
  const filled=imgCache[id].port.map((p,j)=>p.src?j:-1).filter(j=>j>=0);
  if(!filled.includes(portIdx[id]))portIdx[id]=filled[0]||0;
  markDirty();render();
}
function addPortSlot(id){imgCache[id].port.push({src:null,cap:''});data.entries[id].portCount=imgCache[id].port.length;render();}
function portNav(id,d){
  const filled=imgCache[id].port.map((p,j)=>p.src?j:-1).filter(j=>j>=0);
  if(!filled.length)return;
  const cur=filled.indexOf(portIdx[id]);
  portIdx[id]=filled[(cur+d+filled.length)%filled.length];
  render();
}

async function upChImg(inp,chId) {
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{imgCache[`ch${chId}`]=await compress(ev.target.result,1400,.82);markDirty();render();};
  r.readAsDataURL(f);
}
function rmChImg(chId){imgCache[`ch${chId}`]=null;markDirty();render();}

// ── LIGHTBOX ──────────────────────────────────────────────────
function openLb(id,type,startI) {
  lbArr = imgCache[id][type].filter(i=>i.src);
  lbI = Math.min(startI, lbArr.length-1);
  showLbSlide();
  document.getElementById('lb').classList.add('on');
}
function showLbSlide() {
  const img = lbArr[lbI];
  document.getElementById('lbImg').src = img.src;
  document.getElementById('lbCap').textContent = img.cap||'';
  document.getElementById('lbCount').textContent = (lbI+1)+' / '+lbArr.length;
}
function lbNav(d){lbI=(lbI+d+lbArr.length)%lbArr.length;showLbSlide();}
function closeLb(){document.getElementById('lb').classList.remove('on');}
document.addEventListener('keydown', e=>{
  if(!document.getElementById('lb').classList.contains('on'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='ArrowLeft')lbNav(-1);
});

// ── INIT ──────────────────────────────────────────────────────
lang = 'th';
document.getElementById('btnTh').classList.add('on');
loadData();
</script>
